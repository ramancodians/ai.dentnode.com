name: Deploy Laby Agent to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-laby-agent-prod
  cancel-in-progress: false

env:
  GCP_PROJECT: app-dentnode-com
  GCP_REGION: asia-south2
  ARTIFACT_REGISTRY: asia-south2-docker.pkg.dev
  ARTIFACT_REPO: dn-dashboard
  CLOUD_RUN_SERVICE: laby-agent

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pytest tests/ -v --tb=short

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - id: image
        run: |
          SHA="${{ github.sha }}"
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REPO }}/laby-agent:${SHA:0:8}"
          echo "tag=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          docker build -t ${{ steps.image.outputs.tag }} -f Dockerfile .
          docker push ${{ steps.image.outputs.tag }}

      # --no-traffic is not supported when creating a new service (first deploy).
      # Detect this upfront and omit the flag when the service doesn't exist yet.
      - name: Deploy new revision
        id: deploy
        run: |
          SERVICE_EXISTS=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --project=${{ env.GCP_PROJECT }} --region=${{ env.GCP_REGION }} \
            --format="value(name)" 2>/dev/null || true)

          NO_TRAFFIC_FLAG=""
          [ -n "$SERVICE_EXISTS" ] && NO_TRAFFIC_FLAG="--no-traffic --tag=candidate"

          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --project=${{ env.GCP_PROJECT }} --region=${{ env.GCP_REGION }} \
            --image=${{ steps.image.outputs.tag }} \
            --ingress=internal \
            --memory=512Mi \
            --set-env-vars=LABY_MODEL=deepseek/deepseek-chat,NODE_INTERNAL_BASE_URL=https://app.dentnode.com/api \
            --set-secrets=INTERNAL_API_KEY=LABY_INTERNAL_API_KEY:latest,DEEPSEEK_API_KEY=LABY_DEEPSEEK_API_KEY:latest \
            $NO_TRAFFIC_FLAG --quiet

      - id: revision
        run: |
          REV=$(gcloud run revisions list \
            --service=${{ env.CLOUD_RUN_SERVICE }} --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} --sort-by="~DEPLOYED" --limit=1 \
            --format="value(name)")
          echo "name=$REV" >> $GITHUB_OUTPUT

      # Poll Cloud Run's own revision readiness instead of curling /health —
      # the service is --ingress=internal so it's unreachable from GHA runners.
      # Readiness=True means the container started cleanly and passed its health
      # check, which is equivalent (and more reliable) than an external curl.
      - name: Wait for revision ready then promote to 100%
        run: |
          REV="${{ steps.revision.outputs.name }}"

          for i in $(seq 1 18); do
            READY=$(gcloud run revisions describe "$REV" \
              --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT }} \
              --format=json 2>/dev/null \
              | python3 -c "
import json, sys
data = json.load(sys.stdin)
conds = data.get('status', {}).get('conditions', [])
r = next((c for c in conds if c.get('type') == 'Ready'), {})
print(r.get('status', 'Unknown'))
" || echo "Unknown")
            echo "Revision ready check $i/18: $READY"
            [ "$READY" = "True" ] && break
            [ "$i" = "18" ] && { echo "Revision did not become Ready in time."; exit 1; }
            sleep 10
          done

          gcloud run services update-traffic ${{ env.CLOUD_RUN_SERVICE }} \
            --project=${{ env.GCP_PROJECT }} --region=${{ env.GCP_REGION }} \
            --to-revisions=$REV=100
          echo "Deployed $REV to 100%."

      - name: Rollback on failure
        if: failure()
        run: |
          STABLE=$(gcloud run revisions list \
            --service=${{ env.CLOUD_RUN_SERVICE }} --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }} --sort-by="~DEPLOYED" --limit=2 \
            --format="value(name)" | tail -1)
          [ -n "$STABLE" ] && gcloud run services update-traffic \
            ${{ env.CLOUD_RUN_SERVICE }} --project=${{ env.GCP_PROJECT }} \
            --region=${{ env.GCP_REGION }} --to-revisions=${STABLE}=100
          exit 1
